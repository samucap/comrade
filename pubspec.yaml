name: comrade
description: A Flutter voice companion app with immersive avatar interactions
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State Management
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Animations
  rive: ^0.13.20
  animate_do: ^3.3.4

  # Hooks
  flutter_hooks: ^0.20.5

  # Responsive UI
  flutter_screenutil: ^5.9.3

  # Database
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24

  # File System
  path_provider: ^2.1.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code Generation
  riverpod_generator: ^2.4.2
  drift_dev: ^2.20.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - assets/animations/companion_placeholder.riv
